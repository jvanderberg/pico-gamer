<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pico Gamer — Web VM</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: "Courier New", monospace;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      header {
        padding: 8px 16px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      header h1 {
        font-size: 16px;
        color: #e94560;
      }

      .main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .editor-panel {
        flex: 0 0 40%;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #0f3460;
        min-width: 0;
      }

      #editor-label {
        padding: 4px 8px;
        font-size: 12px;
        color: #a0a0a0;
        background: #16213e;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #asm-editor {
        flex: 1;
        background: #0a0a1a;
        color: #00ff88;
        border: none;
        padding: 8px;
        font-family: "Courier New", monospace;
        font-size: 14px;
        resize: none;
        outline: none;
        tab-size: 8;
      }

      .display-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        gap: 16px;
      }

      #screen {
        border: 2px solid #0f3460;
        image-rendering: pixelated;
        background: #000;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #533483;
        padding: 6px 14px;
        font-family: "Courier New", monospace;
        font-size: 13px;
        cursor: pointer;
      }

      button:hover {
        background: #533483;
      }

      button:active {
        background: #e94560;
      }

      select {
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #533483;
        padding: 4px 6px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        cursor: pointer;
      }

      .status-bar {
        display: flex;
        gap: 16px;
        font-size: 12px;
        color: #a0a0a0;
        padding: 4px 8px;
        background: #16213e;
        border-top: 1px solid #0f3460;
      }

      .status-bar span {
        white-space: nowrap;
      }

      #error-output {
        color: #e94560;
        font-size: 12px;
        min-height: 18px;
        max-height: 60px;
        overflow-y: auto;
        padding: 0 8px;
      }

      .debug-views {
        display: flex;
        gap: 8px;
        width: 100%;
        max-width: 540px;
      }

      .debug-view {
        flex: 1;
        min-width: 0;
      }

      .debug-view label {
        display: block;
        font-size: 11px;
        color: #a0a0a0;
        padding: 2px 4px;
      }

      .debug-view pre {
        background: #0a0a1a;
        color: #00ff88;
        font-family: "Courier New", monospace;
        font-size: 11px;
        padding: 4px;
        margin: 0;
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid #0f3460;
      }

      #mem-cmd {
        background: #0a0a1a;
        color: #00ff88;
        font-family: "Courier New", monospace;
        font-size: 11px;
        border: 1px solid #0f3460;
        padding: 4px;
        width: 100%;
        outline: none;
      }

      #mem-cmd::placeholder {
        color: #555;
      }

      #mem-output {
        background: #0a0a1a;
        color: #00ff88;
        font-family: "Courier New", monospace;
        font-size: 11px;
        padding: 4px;
        margin: 0;
        max-height: 200px;
        min-height: 60px;
        overflow-y: auto;
        border: 1px solid #0f3460;
        border-top: none;
      }

      .demo-buttons {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .demo-buttons button {
        font-size: 11px;
        padding: 4px 8px;
      }

      .game-inputs {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }

      .game-inputs button {
        width: 40px;
        height: 40px;
        padding: 0;
        font-size: 16px;
        line-height: 40px;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      .dpad {
        display: grid;
        grid-template-columns: 40px 40px 40px;
        grid-template-rows: 40px 40px 40px;
        gap: 2px;
      }

      .dpad button { border-radius: 4px; }
      .dpad-up    { grid-column: 2; grid-row: 1; }
      .dpad-left  { grid-column: 1; grid-row: 2; }
      .dpad-right { grid-column: 3; grid-row: 2; }
      .dpad-down  { grid-column: 2; grid-row: 3; }

      .encoder-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .encoder-group label {
        font-size: 10px;
        color: #a0a0a0;
      }

      .encoder-row {
        display: flex;
        gap: 4px;
      }

      .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Pico Gamer</h1>
      <span>Web VM Prototype</span>
    </header>
    <div class="main">
      <div class="editor-panel">
        <div id="editor-label">
          <select id="sel-lang">
            <option value="asm">ASM</option>
            <option value="basic">BASIC</option>
          </select>
          <span id="editor-label-text">Assembly Source</span>
        </div>
        <textarea id="asm-editor" spellcheck="false"></textarea>
      </div>
      <div class="display-panel">
        <canvas id="screen" width="512" height="256"></canvas>
        <div class="controls">
          <button id="btn-assemble">Assemble</button>
          <button id="btn-run">Run</button>
          <button id="btn-stop">Stop</button>
          <button id="btn-step">Step</button>
          <button id="btn-reset">Reset</button>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
            <input type="checkbox" id="chk-break-start" /> Break at start
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px">
            Scale:
            <select id="sel-scale">
              <option value="1">1x</option>
              <option value="2">2x</option>
              <option value="3">3x</option>
              <option value="4" selected>4x</option>
            </select>
          </label>
        </div>
        <div class="game-inputs">
          <div class="dpad">
            <button class="dpad-up" data-input="up">&#9650;</button>
            <button class="dpad-left" data-input="left">&#9664;</button>
            <button class="dpad-right" data-input="right">&#9654;</button>
            <button class="dpad-down" data-input="down">&#9660;</button>
          </div>
          <div class="action-buttons">
            <button data-input="btn">A</button>
            <button data-input="enc_btn">B</button>
          </div>
          <div class="encoder-group">
            <label>Encoder</label>
            <div class="encoder-row">
              <button data-input="enc_cw">J &#8592;</button>
              <button data-input="enc_ccw">K &#8594;</button>
            </div>
          </div>
        </div>
        <div class="demo-buttons" id="demo-buttons"></div>
        <div id="error-output"></div>
        <div class="debug-views">
          <div class="debug-view">
            <label>Stack</label>
            <pre id="stack-view">empty</pre>
          </div>
        </div>
        <div class="debug-view" style="width:100%;max-width:540px">
          <label>Memory Monitor</label>
          <input id="mem-cmd" type="text" placeholder="r ADDR [LEN] | r ADDR-ADDR | w ADDR XX ..." spellcheck="false" />
          <pre id="mem-output">Type r ADDR to read, w ADDR XX to write</pre>
        </div>
      </div>
    </div>
    <div class="status-bar">
      <span>PC: <code id="status-pc">0000</code></span>
      <span>SP: <code id="status-sp">0</code></span>
      <span>TOS: <code id="status-tos">—</code></span>
      <span>State: <code id="status-state">idle</code></span>
      <span>Cycles: <code id="status-cycles">0</code></span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
